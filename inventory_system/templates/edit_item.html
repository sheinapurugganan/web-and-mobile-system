{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Edit Item: {{ item.name }}</h1>
    <a href="{{ url_for('index') }}" class="btn btn-outline">Back to Dashboard</a>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('edit_item', id=item.id) }}" method="POST">
        <div class="form-group">
            <label for="name">Item Name</label>
            <input type="text" id="name" name="name" value="{{ item.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ item.description }}</textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="{{ item.quantity }}" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" value="{{ item.price }}" step="0.01" min="0" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center;">
            Save Changes
        </button>
    </form>
</div>
{% endblock %}
