{% extends "base.html" %}

{% block content %}
<div class="dashboard-header" style="justify-content: center;">
    <h1>Login</h1>
</div>

<div class="glass-card" style="max-width: 450px; margin: 0 auto;">
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center;">
            Login
        </button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Register here</a>
    </div>
</div>
{% endblock %}
