{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Add New Item</h1>
    <a href="{{ url_for('index') }}" class="btn btn-outline">Back to Dashboard</a>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('add_item') }}" method="POST">
        <div class="form-group">
            <label for="name">Item Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Mechanical Keyboard" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Short description of the item" rows="3"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="0" min="0" required>
            </div>
            
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" value="0.00" step="0.01" min="0" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center;">
            Add to Inventory
        </button>
    </form>
</div>
{% endblock %}
