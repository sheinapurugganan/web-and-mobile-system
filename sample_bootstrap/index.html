<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Bootstrap</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.css">
    <style>
        :root {
            --bs-primary: #ffc107; --bs-primary-rgb: 255, 193, 7;
            --bs-success: #ffc107; --bs-success-rgb: 255, 193, 7;
            --bs-danger: #ffc107; --bs-danger-rgb: 255, 193, 7;
            --bs-info: #ffc107; --bs-info-rgb: 255, 193, 7;
            --bs-dark: #cca300; --bs-dark-rgb: 204, 163, 0;
            --bs-light: #fffdf5; --bs-light-rgb: 255, 253, 245;
        }
    </style>
    <script src="./bootstrap/js/bootstrap.js"></script>
</head>
<body>
    <div class="container mt-3">
        <h2>Backgrounds</h2>
       <p class="text-bg-success">Intro to Bootstrap</p>
    </div>
    <div class ="container">Intro to Bootstrap</div>
    <div class="container-fluid">Intro to Bootstrap</div>

    <div class="bg-primary text-danger">TEXT</div>
     <div class="bg-success text-light">TEXT</div>
      <div class="bg-danger">TEXT</div>
       <div class="bg-info">TEXT</div>

        <div class="text-primary">TEXT</div>
          <div class="text-success">TEXT</div>
      <div class="text-danger">TEXT</div>
       <div class="text-info">TEXT</div>

       <table class="table table-striped">
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>Doe</td>
                <td>john@example.com</td>
            </tr>
            <tr>
                <td>Mary</td>
                <td>Moe</td>
                <td>mary@example.com</td>
            </tr><tr>
                <td>July</td>
                <td>Dooley</td>
                <td>july@example.com</td>
            </tr>
        </tbody>
       </table>
    <div class="container">
        <h2>Messenger</h2>
        <img src="./image/thel.jpeg" class="img-rounded"
         alt="Cinque" width="304" height="236">

    </div>

    <button type="button" class="btn btn-warning">Basic</button>
     <button type="button" class="btn btn-success">Default</button>
      <button type="button" class="btn btn-danger">Primary</button>
</body>
</html>
