<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #ffc107; --bs-primary-rgb: 255, 193, 7;
            --bs-dark: #cca300; --bs-dark-rgb: 204, 163, 0;
            --bs-light: #fff3cd; --bs-light-rgb: 255, 243, 205;
        }
        body { background-color: #fffdf5; }
        .sidebar { min-height: 100vh; background: #fff8cc; border-right: 1px solid #ffecb3; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Inventory System</a>
            <div class="ms-auto">
                <a href="#" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">  
                        <a class="nav-link text-dark" href="units.html"><i class="bi bi-rulers me-2"></i> Units</a>
                    </li>
                    
                   <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a>
                    </li>
                    <li class="nav-item">  
                        <a class="nav-link text-dark" href="units.html"><i class="bi bi-rulers me-2"></i> Units</a>
                    </li>
                    
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                
                <h2 class="mb-4">Manage Categories</h2>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form class="row g-3 align-items-center">
                            <div class="col-sm-9">
                                <label class="visually-hidden" for="categoryName">Category Name</label>
                                <input type="text" class="form-control" id="categoryName" placeholder="Enter new category name...">
                            </div>
                            <div class="col-sm-3 d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-plus-lg me-1"></i> Add Category
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4" style="width: 100px;">ID</th>
                                        <th>Category Name</th>
                                        <th class="text-end pe-4" style="width: 200px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="ps-4">1</td>
                                        <td>Electronics</td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="ps-4">2</td>
                                        <td>Furniture</td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="ps-4">3</td>
                                        <td>Office Supplies</td>
                                        <td class="text-end pe-4">
                                            <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
