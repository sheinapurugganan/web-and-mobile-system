<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #ffc107; --bs-primary-rgb: 255, 193, 7;
            --bs-dark: #cca300; --bs-dark-rgb: 204, 163, 0;
            --bs-light: #fff3cd; --bs-light-rgb: 255, 243, 205;
        }
        body { background-color: #fffdf5; }
        .sidebar { min-height: 100vh; background: #fff8cc; border-right: 1px solid #ffecb3; }
        .stat-card { border-radius: 10px; border: 1px solid #ffecb3; transition: transform 0.2s; background-color: #fffde6; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-light border-bottom px-4">
        <span class="navbar-brand mb-0 h1">Inventory System</span>
        <a href="login.html" class="text-decoration-none text-danger">Logout</a>
    </nav>

     <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="Items.html"><i class="bi bi-tags me-2"></i> Items</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="categories.html"><i class="bi bi-box-seam me-2"></i> Categories</a>
                    </li>
                    <li class="nav-item">  
                        <a class="nav-link text-dark" href="units.html"><i class="bi bi-rulers me-2"></i> Units</a>
                    </li>
                    
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                
                <div class="row text-center mb-5">
                    <div class="col-md-4 mb-3">
                        <div class="card stat-card shadow-sm p-4">
                            <h1 class="display-4 fw-bold">100</h1>
                            <p class="text-muted mb-0">Items</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card stat-card shadow-sm p-4 border-warning">
                            <h1 class="display-4 fw-bold text-warning">10</h1>
                            <p class="text-muted mb-0">Low Qty</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card stat-card shadow-sm p-4 border-danger">
                            <h1 class="display-4 fw-bold text-danger">20</h1>
                            <p class="text-muted mb-0">Empty Stock</p>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h4 class="mb-0">Recent Activity</h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">ID</th>
                                        <th scope="col">Activity</th>
                                        <th scope="col">Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>#001</td>
                                        <td>Restocked 50 Widget A</td>
                                        <td>2026-02-26</td>
                                    </tr>
                                    <tr>
                                        <td>#002</td>
                                        <td>Sold 5 Gadget B</td>
                                        <td>2026-02-25</td>
                                    </tr>
                                    <tr>
                                        <td>#003</td>
                                        <td>Updated Inventory - Warehouse A</td>
                                        <td>2026-02-24</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
