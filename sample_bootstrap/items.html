<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System - Manage Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-primary: #ffc107; --bs-primary-rgb: 255, 193, 7;
            --bs-dark: #cca300; --bs-dark-rgb: 204, 163, 0;
            --bs-light: #fff3cd; --bs-light-rgb: 255, 243, 205;
        }
        body { background-color: #fffdf5; }
        .sidebar { min-height: 100vh; background: #fff8cc; border-right: 1px solid #ffecb3; }
        .nav-link:hover { background-color: #ffecb3; border-radius: 5px; }
        .table-container { background: #fffde6; border-radius: 10px; overflow: hidden; border: 1px solid #ffcc00 !important; }
        .btn-add { background-color: #ffc107; color: #000; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Inventory System</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="dashboard.html"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-primary" href="items.html"><i class="bi bi-box-seam me-2"></i> Items</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="categories.html"><i class="bi bi-tags me-2"></i> Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="units.html"><i class="bi bi-layers me-2"></i> Units</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <h2 class="mb-4">Inventory Items</h2>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control" placeholder="Search items by name or ID...">
                                </div>
                            </div>
                            <div class="col-md-4 d-grid">
                                <button class="btn btn-primary" type="button">
                                    <i class="bi bi-plus-lg me-2"></i>Add New Item
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-container shadow-sm border">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Item Name</th>
                                    <th>Unit</th>
                                    <th>Quantity</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4 text-muted">001 </td>
                                    <td><span class="fw-semibold">Electronics </span></td>
                                    <td><span class="badge bg-light text-dark border"> Pcs</span></td>
                                    <td><span class="fw-bold"> </span>10</td>
                                     <td class="text-center pe-4">
                                            <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                                        </td>
                                </tr>
                                <tr>
                                    <td class="ps-4 text-muted"> 002</td>
                                    <td><span class="fw-semibold">Electronics </span></td>
                                    <td><span class="badge bg-light text-dark border">pcs </span></td>
                                    <td><span class="fw-bold text-danger">10 </span> <small class="text-danger"></small></td>
                                     <td class="text-center pe-4">
                                            <button class="btn btn-sm btn-outline-secondary me-1">Edit</button>
                                            <button class="btn btn-sm btn-outline-danger">Delete</button>
                                        </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
